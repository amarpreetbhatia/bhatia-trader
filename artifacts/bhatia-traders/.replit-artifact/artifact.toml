kind = "web"
previewPath = "/"
title = "Bhatia Traders"
version = "1.0.0"
id = "artifacts/bhatia-traders"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21635

[services.development]
run = "pnpm --filter @workspace/bhatia-traders run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/bhatia-traders", "run", "build" ]
publicDir = "artifacts/bhatia-traders/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21635"
BASE_PATH = "/"
